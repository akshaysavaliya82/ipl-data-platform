version: '3.8'

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: ipl_analytics
  POSTGRES_USER: ipl_admin
  POSTGRES_PASSWORD: ipl_secure_password_2024
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092

services:
  # ============================================
  # Infrastructure Services
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: ipl-postgres
    environment:
      POSTGRES_DB: ipl_analytics
      POSTGRES_USER: ipl_admin
      POSTGRES_PASSWORD: ipl_secure_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipl_admin -d ipl_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipl-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ipl-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - ipl-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ipl-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ipl-network

  # ============================================
  # Spark Services
  # ============================================
  spark-master:
    image: bitnami/spark:3.5
    container_name: ipl-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./:/opt/app
      - spark_data:/opt/data
    networks:
      - ipl-network

  spark-worker:
    image: bitnami/spark:3.5
    container_name: ipl-spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    volumes:
      - ./:/opt/app
      - spark_data:/opt/data
    networks:
      - ipl-network

  # ============================================
  # Airflow Services
  # ============================================
  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: ipl-airflow-webserver
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ipl_admin:ipl_secure_password_2024@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'ipl-airflow-secret-key-2024'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/app
      - airflow_logs:/opt/airflow/logs
    networks:
      - ipl-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: ipl-airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ipl_admin:ipl_secure_password_2024@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/app
      - airflow_logs:/opt/airflow/logs
    networks:
      - ipl-network

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: ipl-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@ipl-platform.com || true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://ipl_admin:ipl_secure_password_2024@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    networks:
      - ipl-network

  # ============================================
  # Application Services
  # ============================================
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: ipl-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/opt/app
      - ./data:/opt/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - ipl-network

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: ipl-dashboard
    depends_on:
      - api
    environment:
      <<: *common-env
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    volumes:
      - ./:/opt/app
      - ./data:/opt/app/data
    networks:
      - ipl-network

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
  spark_data:
  airflow_logs:

networks:
  ipl-network:
    driver: bridge
    name: ipl-data-platform
