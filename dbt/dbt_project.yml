name: 'ipl_analytics'
version: '1.0.0'
config-version: 2

profile: 'ipl_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ipl_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      core:
        +materialized: table
        +schema: core
      analytics:
        +materialized: incremental
        +schema: analytics

seeds:
  ipl_analytics:
    +schema: seeds

vars:
  start_date: '2008-01-01'
  current_season: 2024
