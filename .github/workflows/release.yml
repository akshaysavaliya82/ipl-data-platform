name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

env:
  PYTHON_VERSION: "3.12"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov httpx
          pip install fastapi uvicorn pydantic pydantic-settings
          pip install structlog prometheus-client
          pip install sqlalchemy psycopg2-binary
          pip install pyyaml python-dotenv requests

      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/unit/ -v --tb=short

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/api/Dockerfile -t ipl-api:${{ github.ref_name }} .

      - name: Build Dashboard image
        run: docker build -f docker/dashboard/Dockerfile -t ipl-dashboard:${{ github.ref_name }} .
